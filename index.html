<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>JNTU Campus GeoNav AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene vr-mode-ui="enabled: false"
             embedded
             arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;">

        <a-sphere gps-entity-place="latitude: 17.4933; longitude: 78.3915;" 
                  radius="1.5" 
                  color="red"
                  look-at="[gps-camera]">
        </a-sphere>

        <a-sphere gps-entity-place="latitude: 17.4945; longitude: 78.3925;" 
                  radius="1.5" 
                  color="blue"
                  look-at="[gps-camera]">
        </a-sphere>

        <a-entity
            geometry="primitive: cylinder; height: 0.1; radius: 1"
            material="color: yellow; opacity: 0.6"
            gps-entity-place="latitude: 17.4933; longitude: 78.3915;">
        </a-entity>

        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        // Check for GPS signals and log coordinates to the browser console for debugging
        window.onload = () => {
            if (!navigator.geolocation) {
                alert("GPS not supported by this browser.");
            } else {
                navigator.geolocation.watchPosition((position) => {
                    console.log("Live GPS Location:", position.coords.latitude, position.coords.longitude);
                }, (err) => {
                    console.error("GPS Error:", err);
                }, {
                    enableHighAccuracy: true
                });
            }
        };
    </script>
</body>
</html>
