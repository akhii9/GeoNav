<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>JNTU Campus GeoNav AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene vr-mode-ui="enabled: false"
             embedded
             arjs="sourceType: webcam; debugUIEnabled: false;">

        <a-sphere gps-entity-place="latitude: 17.49XXXX; longitude: 78.39XXXX;" 
                  radius="1.5" 
                  color="red"
                  look-at="[gps-camera]">
        </a-sphere>

        <a-sphere gps-entity-place="latitude: 17.49YYYY; longitude: 78.39YYYY;" 
                  radius="1.5" 
                  color="blue"
                  look-at="[gps-camera]">
        </a-sphere>

        <a-entity
            geometry="primitive: cylinder; height: 0.1; radius: 0.5"
            material="color: yellow; opacity: 0.6"
            gps-entity-place="latitude: 17.49XXXX; longitude: 78.39XXXX;">
        </a-entity>

        <a-camera gps-camera rotation-reader x-recalc-gps-aspect></a-camera>
    </a-scene>

    <script>
        // Helpful for debugging: Logs your current GPS position in the console
        window.onload = () => {
            navigator.geolocation.getCurrentPosition((position) => {
                console.log("Current GPS:", position.coords.latitude, position.coords.longitude);
            });
        };
    </script>
</body>
</html>
